version: '3.8'

services:
  evolution-api:
    image: atendare/evolution-api:latest
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Configurações Gerais
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      - SERVER_TYPE=http
      - LOG_LEVEL=ERROR,WARN,INFO
      - DELAY_MESSAGES=true

      # Segurança — API Key administrativa
      # ⚠️  TROQUE para uma chave forte antes de ir para produção
      - API_KEY=obras2024_evolution_key

      # CORS
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - CORS_HEADERS=Content-Type,Authorization,apikey

      # Persistência de sessões no disco (evita desconexão ao reiniciar)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@postgres:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_INST=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false

      # Redis para cache de conexões (melhora estabilidade)
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379

      # Webhook global desativado (configuramos por instância)
      - WEBHOOK_GLOBAL_ENABLED=false

    depends_on:
      - redis
      - postgres
    networks:
      - evolution-network
    volumes:
      - evolution_instances:/evolution/instances

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - evolution-network

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=evolution
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-network

volumes:
  redis_data:
  postgres_data:
  evolution_instances:

networks:
  evolution-network:
    driver: bridge
